<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournoi BF6 — Les Potes Ö Feu</title>
  <link rel="stylesheet" href="../Css/style.css">
  <link rel="stylesheet" href="../Css/tournoi.css">
  <script src="../Javascript/tournoi.js" defer></script>
</head>
<body>

  <div class="tournoi-container">

    <div class="tournoi-header">
      <h1>⚔️ Tournoi BF6</h1>
      <p style="color:#888; margin-bottom:8px;">Les Potes Ö Feu — Saison 1</p>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>

    <div class="global-stats">
      <div class="stat-card">
        <div class="value" id="total-players">—</div>
        <div class="label">Joueurs</div>
      </div>
      <div class="stat-card">
        <div class="value" id="total-kills">—</div>
        <div class="label">Kills totaux</div>
      </div>
      <div class="stat-card">
        <div class="value" id="best-kd">—</div>
        <div class="label">Meilleur K/D</div>
      </div>
    </div>

    <div class="leaderboard">
      <div class="leaderboard-header">
        <div>#</div>
        <div>Joueur</div>
        <div style="text-align:center">K/D</div>
        <div style="text-align:center">Kills</div>
        <div style="text-align:center" class="col-wins">Wins</div>
      </div>
      <div id="leaderboard-body">
        <div class="loading">
          <div class="loading-spinner"></div>
          Chargement du classement...
        </div>
      </div>
    </div>

    <p style="text-align:center; color:#555; font-size:0.8rem; margin-top:1rem;">
      Mis à jour automatiquement toutes les 60 secondes
    </p>

  </div>

  

</body>
</html>
